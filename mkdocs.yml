plugins:
  - search


theme:
  name: material
  language: zh
  # 1. 调色盘：支持深浅模式自动切换
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: white    # 极简白背景 网站头部颜色
      accent: indigo    # 链接和交互色
      toggle:
        icon: material/brightness-7
        name: 切换至深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black    # 深色模式
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: 切换至浅色模式

  # 2. 界面细节优化
  features:
    - navigation.tabs              # 顶部横向菜单栏（适合分类多时）
    - navigation.tracking          # 滚动时自动定位侧边栏
    - navigation.top               # 返回顶部按钮
    - search.suggest               # 搜索输入补全
    - search.highlight             # 搜索结果高亮
    - content.code.copy            # 代码块一键复制按钮
    - content.code.annotate        # 代码行注释支持
    - content.tabs.link            # 标签切换状态持久化

  icon:
    logo: material/cat
    repo: fontawesome/brands/github  # 这一行是关键，强制指定右上角为小猫
    favicon: material/cat          # 浏览器标签页的小图标

copyright: |
  Copyright &copy; 2026 LiuTianBa7 

markdown_extensions:
#  - toc:
#      toc_depth: 4              # 目录显示到四级标题
#      permalink: true           # 标题旁显示永久链接图标
  - attr_list
  - md_in_html
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:          # 语法高亮
      anchor_linenums: true       # 行号锚点
      line_spans: __span          # 行跨度
      pygments_lang_class: true   # 语言类名
  - pymdownx.inlinehilite        # 内联代码高亮
  - pymdownx.snippets            # 代码片段
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.arithmatex:         # 数学公式支持
      generic: true


extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
  - javascripts/reading-progress.js
  - https://unpkg.com/mermaid@10.9.3/dist/mermaid.min.js
  - javascripts/mermaid.js

extra_css:
